name: Dispatch site rebuild

on:
  push:
    branches: [main]
    paths:
      - 'plugins/**'
      - '.claude-plugin/marketplace.json'

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger athan-dial.github.io rebuild
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.SITE_DISPATCH_TOKEN }}" \
            https://api.github.com/repos/athan-dial/athan-dial.github.io/dispatches \
            -d '{"event_type":"skills-updated"}'
